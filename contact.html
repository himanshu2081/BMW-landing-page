<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | BMW</title>

<style>

/* ================= GLOBAL ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#111;
    color:white;
}

/* ================= NAVBAR ================= */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 40px;
    background:#000;
    border-bottom:2px solid #00adb5;
}

.logo img{
    width:50px;          /* circle size */
    height:50px;         /* width = height important */
    border-radius:50%;   /* makes it circle */
    object-fit:cover;    /* image stretch na ho */
    border:2px solid #00adb5;  /* optional professional border */
    padding:3px;         /* thoda space andar */
    background:white;    /* clean background */
}
.nav-links{
    list-style:none;
    display:flex;
    gap:25px;
}

.nav-links a{
    text-decoration:none;
    color:white;
    font-weight:bold;
    transition:0.3s;
}

.nav-links a:hover{
    color:#00adb5;
}

.nav-btn{
    background:#00adb5;
    padding:10px 18px;
    border-radius:6px;
    text-decoration:none;
    color:black;
    font-weight:bold;
    transition:0.3s;
}

.nav-btn:hover{
    background:white;
}

/* ================= CONTACT SECTION ================= */
#contact{
    padding:60px 20px;
}

.contact-title{
    text-align:center;
    color:#00adb5;
    margin-bottom:40px;
    font-size:32px;
}

/* CENTER CONTAINER */
.contact-container{
    display:flex;
    justify-content:center;
    align-items:center;
}

/* FORM */
.contact-form{
    background:#222;
    padding:30px;
    border-radius:12px;
    width:350px;
    box-shadow:0 0 15px #00adb5;
}

.contact-form input,
.contact-form textarea{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border:none;
    border-radius:6px;
    background:#111;
    color:white;
}

.contact-form input:focus,
.contact-form textarea:focus{
    outline:2px solid #00adb5;
}

.contact-form textarea{
    resize:none;
    height:120px;
}

.contact-form button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#00adb5;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.contact-form button:hover{
    background:white;
}

/* FOOTER */
footer{
    background:#000;
    text-align:center;
    padding:22px;
    border-top:2px solid #00adb5;
    color:#aaa;
}

/* ================= RESPONSIVE ================= */
@media(max-width:768px){

    .navbar{
        flex-direction:column;
        gap:15px;
    }

    .nav-links{
        flex-direction:column;
        align-items:center;
    }

    .contact-form{
        width:90%;
    }
}

</style>
</head>

<body>

<header>
<nav class="navbar">

<a href="./BMW landing page.html" class="logo">
    <img src="./bmw logo.jpg" alt="BMW Logo">
</a>
<ul class="nav-links">
    <li><a href="./BMW landing page.html">Home</a></li>
    <li><a href="./models.html">Models</a></li>
    <li><a href="./Technology.html">Technology</a></li>
    <li><a href="./contact.html">Contact</a></li>
</ul>

<a href="./Booktestdrive.html" class="nav-btn">Book Test Drive</a>

</nav>
</header>


<section id="contact">

<h1 class="contact-title">Contact Me</h1>

<div class="contact-container">

<form class="contact-form">
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Your Email" required>
    <input type="tel" placeholder="Phone Number">
    <textarea placeholder="Your Message"></textarea>
    <button type="submit">Send Message</button>
</form>

</div>

</section>

<footer>
<p>© 2026 | All Rights Reserved by Himanshu Pathak</p>
</footer>

</body>
</html>
