<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Drive Booking</title>

<style>

/* ===== GLOBAL ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:
    linear-gradient(rgba(0,0,0,.7), rgba(0,0,0,.7)),
    url("BMW 7.jpg") center/cover no-repeat;
    min-height:100vh;
    color:white;
    display:flex;
    flex-direction:column;
}

/* ===== NAVBAR ===== */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:#000;
}

.nav-links{
    list-style:none;
    display:flex;
    gap:25px;
}

.nav-links a{
    text-decoration:none;
    color:white;
    font-weight:bold;
    transition:.3s;
}

.nav-links a:hover{
    color:#00adb5;
}

.nav-btn{
    background:#00adb5;
    padding:10px 18px;
    border-radius:6px;
    text-decoration:none;
    color:black;
    font-weight:bold;
    transition:.3s;
}

.nav-btn:hover{
    background:white;
}

/* ===== CENTER AREA ===== */
.main-content{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

/* ===== FORM CARD ===== */
.container{
    background:#111;
    padding:35px;
    width:420px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,173,181,.7);
}

.container h2{
    text-align:center;
    margin-bottom:20px;
    color:#00adb5;
}

/* ===== FORM ===== */
form{
    display:flex;
    flex-direction:column;
}

label{
    margin-top:12px;
    font-size:14px;
}

input, select{
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    border:none;
    background:#222;
    color:white;
}

input:focus, select:focus{
    outline:2px solid #00adb5;
}

button{
    margin-top:20px;
    padding:12px;
    background:#00adb5;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}
.logo img{
    width:50px;          /* circle size */
    height:50px;         /* width = height important */
    border-radius:50%;   /* makes it circle */
    object-fit:cover;    /* image stretch na ho */
    border:2px solid #00adb5;  /* optional professional border */
    padding:3px;         /* thoda space andar */
    background:white;    /* clean background */
}
button:hover{
    background:white;
}

/* ===== BACK LINK ===== */
.back{
    display:block;
    text-align:center;
    margin-top:15px;
    color:#00adb5;
    text-decoration:none;
}

.back:hover{
    text-decoration:underline;
}

/* ===== FOOTER ===== */
footer{
    background:#000;
    text-align:center;
    padding:15px;
}

</style>
</head>

<body>

<header>
<nav class="navbar">

<a href="./index" class="logo">
    <img src="./bmw logo.jpg" alt="BMW Logo">
</a>

<ul class="nav-links">
    <li><a href="./index">Home</a></li>
    <li><a href="./models.html">Models</a></li>
    <li><a href="./Technology.html">Technology</a></li>
    <li><a href="./contact.html">Contact</a></li>
</ul>

<a href="./Booktestdrive.html" class="nav-btn">Book Test Drive</a>

</nav>
</header>

<div class="main-content">

<div class="container">

<h2>Book Your BMW Test Drive</h2>

<form>

<label>Full Name</label>
<input type="text" required>

<label>Email Address</label>
<input type="email" required>

<label>Mobile Number</label>
<input type="tel" required>

<label>Select Model</label>
<select>
<option>BMW M4</option>
<option>BMW i7</option>
<option>BMW X5</option>
<option>BMW 3 Series</option>
</select>

<label>Preferred Date</label>
<input type="date">

<label>Preferred Time</label>
<input type="time">

<label>City / Showroom Location</label>
<input type="text">

<button type="submit">Confirm Booking</button>

</form>

<a href="./index" class="back">← Back to Home</a>

</div>
</div>

<footer>
<p>© 2026 | All Rights Reserved by Himanshu Pathak</p>
</footer>

</body>

</html>
